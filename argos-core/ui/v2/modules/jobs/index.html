<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>ARGOS — Jobs</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../../static/tokens.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div x-data="app()" x-cloak>

  <div class="shell">

    <header class="topbar">
      <a class="topbar__brand" href="../dashboard/index.html">
        <img src="/ui/v2/static/brand/mark-full-color.svg" alt="">
        <span class="topbar__wordmark">ARGOS</span>
      </a>
      <span class="topbar__divider"></span>
      <div class="topbar__module">
        <span>Jobs</span>
        <span class="crumb-sep">/</span>
        <strong x-text="moduleSubtitle()"></strong>
      </div>

      <div class="topbar__search" @click="openPalette()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Search or run command</span>
        <span class="kbd">⌘K</span>
      </div>

      <div class="topbar__right">
        <div class="topbar__conn">
          <span class="dot" :class="connected ? 'dot--ok' : 'dot--error dot--pulse'"></span>
          <span x-text="connected ? 'live' : 'reconnecting'"></span>
        </div>
        <div class="topbar__user" title="operator@hermes">op</div>
      </div>
    </header>

    <aside class="sidebar">
      <div class="side-section">
        <div class="side-section__label">Modules</div>
        <a class="nav-item" href="../dashboard/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></span>Dashboard</a>
        <a class="nav-item" href="../approvals/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7h18M3 12h18M3 17h12"/></svg></span>Approvals<span class="nav-item__shortcut">g a</span></a>
        <a class="nav-item" href="../fleet/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>Fleet<span class="nav-item__shortcut">g f</span></a>
        <a class="nav-item is-active" href="./index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 5v14l11-7z"/></svg></span>Jobs<span class="nav-item__count num" x-text="counts.total"></span></a>
        <a class="nav-item" href="../health/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12h-4l-3 9-6-18-3 9H2"/></svg></span>Health<span class="nav-item__shortcut">g h</span></a>
        <a class="nav-item" href="../chats/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Chat<span class="nav-item__shortcut">g c</span></a>
        <a class="nav-item" href="../reasoning/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>Reasoning<span class="nav-item__shortcut">g r</span></a>
        <a class="nav-item" href="../settings/index.html"><span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/></svg></span>Settings<span class="nav-item__shortcut">g s</span></a>
      </div>

      <div class="side-section">
        <div class="side-section__label">Filters</div>
        <div class="filter-group">
          <div class="side-section__label" style="padding: var(--s-2) var(--s-2) var(--s-1);">Status</div>
          <template x-for="s in ['active','waiting','failed','ok']" :key="s">
            <label class="filter-row" :class="{'is-checked': filter === s}" @click.prevent="filter = (filter === s ? 'all' : s)">
              <input type="radio" :checked="filter === s">
              <span style="text-transform: capitalize;" x-text="s"></span>
              <span class="mono" x-text="filterCount(s)"></span>
            </label>
          </template>
          <label class="filter-row" :class="{'is-checked': filter === 'all'}" @click.prevent="filter = 'all'">
            <input type="radio" :checked="filter === 'all'">
            <span>All</span>
            <span class="mono" x-text="counts.total"></span>
          </label>
        </div>
      </div>
    </aside>

    <main class="main">

      <template x-if="!connected">
        <div class="banner banner--error">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>
          <span class="banner__msg">SSE disconnected — reconnecting</span>
          <span class="spacer"></span>
        </div>
      </template>

      <template x-if="error">
        <div class="banner banner--error">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          <span class="banner__msg" x-text="error"></span>
          <span class="spacer"></span>
          <button class="btn btn--ghost" @click="error = null">Dismiss</button>
        </div>
      </template>

      <div class="module__head">
        <h1 class="module__title">Jobs</h1>
        <span class="module__sub" x-show="data">
          <span class="num" x-text="counts.total"></span> total ·
          <span class="num" x-text="counts.waiting"></span> waiting ·
          <span class="num" x-text="counts.running"></span> running ·
          <span class="num" x-text="counts.ok"></span> ok ·
          <span class="num" x-text="counts.failed"></span> failed
          <span x-show="pending.length > 0" style="color: var(--risk-medium); margin-left: var(--s-2);" x-text="'· ⚠ ' + pending.length + ' pending auth'"></span>
        </span>
        <div class="module__actions">
          <button class="btn btn--ghost" @click="loadAll()" :disabled="loading">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/></svg>
            <span x-text="loading ? 'Loading…' : 'Refresh'"></span>
          </button>
        </div>
      </div>

      <div class="module__body">
        <div class="queue">
          <template x-for="j in filteredJobs" :key="j.id">
            <article class="card" :data-job-status="j.status" :class="{'is-focused': expandedId === j.id}">
              <header class="card__head" @click="toggleExpand(j.id)" style="cursor: pointer;">
                <span class="dot" :class="'job-dot--' + (j.status || 'unknown')"></span>
                <span class="auth-id" x-text="'#' + j.id"></span>
                <span class="card__kind" x-text="j.status || 'unknown'"></span>
                <span class="mono" style="color: var(--text-secondary);" x-text="j.title"></span>
                <span class="spacer"></span>
                <span class="mono" x-text="formatTime(j.created_at)"></span>
                <span class="mono" style="color: var(--text-tertiary); width: 14px;" x-text="expandedId === j.id ? '▼' : '▶'"></span>
              </header>
              <div x-show="j.error" class="card__op" style="color: var(--risk-high);" x-text="j.error"></div>

              <template x-if="expandedId === j.id">
                <div style="padding: var(--s-3); background: var(--bg-sunken); border-radius: var(--r-sm); margin-top: var(--s-2);">
                  <template x-if="detailLoading">
                    <div style="color: var(--text-secondary);">Loading details…</div>
                  </template>
                  <template x-if="!detailLoading && detail">
                    <div>
                      <dl class="kv" style="margin-bottom: var(--s-3);">
                        <dt>conversation</dt><dd x-text="'#' + (detail?.job?.conversation_id ?? '?')"></dd>
                        <dt>created</dt><dd x-text="formatTimeFull(detail?.job?.created_at)"></dd>
                        <dt>updated</dt><dd x-text="formatTimeFull(detail?.job?.updated_at)"></dd>
                        <dt>segment</dt><dd x-text="(detail?.job?.current_segment ?? 0) + '/' + detailSteps.length"></dd>
                      </dl>

                      <div class="section-label">Steps</div>
                      <pre class="json" x-show="detailSteps.length > 0">
<template x-for="(step, idx) in detailSteps" :key="idx"><span><span style="color: var(--text-tertiary);" x-text="idx.toString().padStart(2, ' ') + '  '"></span><span style="color: var(--accent);" x-text="(step.target || '-').padEnd(8, ' ') + '  '"></span><span x-text="step.command"></span><span x-show="getStepResult(idx)" :style="getStepResult(idx)?.returncode === 0 ? 'color: var(--status-ok);' : 'color: var(--risk-high);'" x-text="'  ' + (getStepResult(idx)?.returncode === 0 ? '✓' : '✗ rc=' + getStepResult(idx)?.returncode)"></span><span>
</span></span></template>
                      </pre>
                      <div x-show="detailSteps.length === 0" style="color: var(--text-tertiary); font-size: var(--fs-12);">no steps data</div>

                      <template x-if="detailResults.length > 0">
                        <div style="margin-top: var(--s-3);">
                          <div class="section-label">Results</div>
                          <template x-for="(r, idx) in detailResults" :key="idx">
                            <div class="card" style="margin-bottom: var(--s-2); padding: var(--s-2) var(--s-3);">
                              <header class="card__head">
                                <span class="mono" style="color: var(--text-tertiary);" x-text="'step ' + r.step"></span>
                                <span class="card__kind" x-text="r.command"></span>
                                <span class="spacer"></span>
                                <span class="mono" :style="r.returncode === 0 ? 'color: var(--status-ok);' : 'color: var(--risk-high);'" x-text="'rc=' + r.returncode"></span>
                              </header>
                              <pre x-show="r.stdout" class="json" style="max-height: 120px; overflow-y: auto; white-space: pre-wrap;" x-text="r.stdout"></pre>
                              <pre x-show="r.stderr" class="json" style="max-height: 80px; overflow-y: auto; white-space: pre-wrap; color: var(--risk-high);" x-text="r.stderr"></pre>
                            </div>
                          </template>
                        </div>
                      </template>

                      <template x-if="(detail?.authorizations || []).length > 0">
                        <div style="margin-top: var(--s-3);">
                          <div class="section-label">Authorizations</div>
                          <template x-for="a in detail.authorizations" :key="a.id">
                            <div class="card" style="margin-bottom: var(--s-2);" :data-risk="a.risk_level">
                              <div class="card__op" x-text="a.operation"></div>
                              <pre x-show="a.details" class="json" style="max-height: 80px; overflow-y: auto; white-space: pre-wrap;" x-text="a.details"></pre>
                              <footer class="card__foot">
                                <span class="risk" :class="'risk--' + a.risk_level" x-text="a.risk_level"></span>
                                <span class="mono" style="color: var(--text-secondary);" x-text="'status: ' + a.status"></span>
                                <span class="spacer"></span>
                                <template x-if="a.status === 'pending'">
                                  <span style="display: flex; gap: var(--s-2);">
                                    <button class="btn btn--primary" @click.stop="decide(a.id, 'approved')">Approve</button>
                                    <button class="btn btn--danger" @click.stop="decide(a.id, 'denied')">Deny</button>
                                  </span>
                                </template>
                              </footer>
                            </div>
                          </template>
                        </div>
                      </template>

                      <div style="margin-top: var(--s-3); display: flex; gap: var(--s-2);">
                        <button x-show="detail?.job?.status === 'pending'" class="btn btn--primary" @click.stop="executeJob(j.id)">▶ Execute</button>
                        <button x-show="detail?.job?.status === 'failed'" class="btn btn--danger" @click.stop="deleteJob(j.id)">Delete</button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </article>
          </template>
          <template x-if="data && filteredJobs.length === 0">
            <div class="empty">
              <div class="empty__inner">
                <img class="empty__mark" src="/ui/v2/static/brand/mark-mono-amber.svg" alt="">
                <h2 class="empty__title">No jobs</h2>
                <div class="empty__sub">No jobs match the current filter.</div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </main>

    <aside class="rail">
      <div class="rail__head">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color: var(--accent);"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span class="rail__title">Now</span>
        <span class="spacer" style="flex: 1;"></span>
        <span class="dot" :class="connected ? 'dot--ok dot--pulse' : 'dot--error'"></span>
        <span class="mono" style="color: var(--text-tertiary); font-size: var(--fs-11);" x-text="connected ? 'live' : 'paused'"></span>
      </div>
      <div class="rail__body">
        <template x-for="item in feed" :key="item.uid">
          <div class="feed-item" :class="'feed-item--' + item.kind">
            <span class="feed-item__time" x-text="item.t"></span>
            <div class="feed-item__body">
              <div class="feed-item__title" x-text="item.title"></div>
              <div class="feed-item__sub" x-text="item.sub"></div>
            </div>
          </div>
        </template>
        <template x-if="feed.length === 0">
          <div style="padding: var(--s-3); color: var(--text-tertiary); font-size: var(--fs-12);">waiting for events…</div>
        </template>
      </div>
    </aside>

    <footer class="statusbar">
      <span class="seg-group"><span class="dot dot--ok"></span><span class="label">jobs:</span><span x-text="counts.running + '/' + counts.total"></span></span>
      <span class="seg-group"><span class="dot" :class="connected ? 'dot--ok' : 'dot--error'"></span><span class="label">sse:</span><span x-text="connected ? 'live' : 'down'"></span></span>
      <span class="seg-group"><span class="label">last:</span><span x-text="lastLoadedRel()"></span></span>
      <span class="spacer"></span>
      <span class="label">argos v0.7.0 · ui v2 · jobs</span>
    </footer>

  </div>

  <template x-if="paletteOpen">
    <div class="palette-backdrop" @click.self="closePalette()">
      <div class="palette" role="dialog">
        <input x-model="paletteQuery" @keydown.escape.stop="closePalette()" class="palette__input" type="text" autofocus placeholder="Search or run command…">
        <template x-for="(a, i) in paletteResults" :key="i">
          <div class="palette__item" :class="{'is-active': i === paletteSelectedIdx}" @click="runPaletteAction(i)">
            <span x-text="a.label"></span><span class="spacer"></span><span class="meta" x-text="a.hint"></span>
          </div>
        </template>
        <div class="palette__foot">
          <span class="hint"><span class="kbd">↑↓</span> navigate</span>
          <span class="hint"><span class="kbd">⏎</span> run</span>
          <span class="hint"><span class="kbd">esc</span> close</span>
          <span class="spacer" style="flex:1;"></span>
          <span class="mono" style="color: var(--text-disabled);" x-text="paletteResults.length + ' matches'"></span>
        </div>
      </div>
    </div>
  </template>

</div>

<script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<script>
function app() {
  return {
    data: null, pending: [], filter: 'all', loading: false, error: null,
    expandedId: null, detail: null, detailLoading: false, lastLoadedAt: null,
    connected: false, _reconnectDelay: 1000, _reconnectTimer: null, _es: null,
    paletteOpen: false, paletteQuery: '', paletteSelectedIdx: 0,
    feed: [], _feedSeq: 0,

    init() {
      window.addEventListener('keydown', (e) => this.onGlobalKey(e));
      this.$watch('paletteQuery', () => { this.paletteSelectedIdx = 0; });
      this.loadAll();
      this.connectStream();
    },

    async loadAll() {
      this.loading = true; this.error = null;
      try {
        const [jr, ar] = await Promise.all([
          fetch('/api/jobs').then(r => r.ok ? r.json() : Promise.reject('jobs HTTP ' + r.status)),
          fetch('/api/authorizations/pending').then(r => r.ok ? r.json() : Promise.reject('auth HTTP ' + r.status)),
        ]);
        this.data = jr.jobs || jr || [];
        this.pending = ar.authorizations || ar || [];
        this.lastLoadedAt = Date.now();
      } catch (e) {
        this.error = 'load failed: ' + e;
      } finally { this.loading = false; }
    },

    get counts() {
      const list = this.data || [];
      return {
        total: list.length,
        waiting: list.filter(j => j.status === 'waiting_auth' || j.status === 'pending').length,
        running: list.filter(j => j.status === 'running').length,
        ok: list.filter(j => j.status === 'ok').length,
        failed: list.filter(j => j.status === 'failed').length,
      };
    },

    filterCount(f) {
      const list = this.data || [];
      if (f === 'active')  return list.filter(j => ['pending','running','waiting_auth'].includes(j.status)).length;
      if (f === 'waiting') return list.filter(j => j.status === 'waiting_auth' || this.pending.find(a => a.job_id === j.id)).length;
      if (f === 'failed')  return list.filter(j => j.status === 'failed').length;
      if (f === 'ok')      return list.filter(j => j.status === 'ok').length;
      return list.length;
    },

    get filteredJobs() {
      let list = this.data || [];
      if (this.filter === 'active')  list = list.filter(j => ['pending','running','waiting_auth'].includes(j.status));
      if (this.filter === 'waiting') list = list.filter(j => j.status === 'waiting_auth' || this.pending.find(a => a.job_id === j.id));
      if (this.filter === 'failed')  list = list.filter(j => j.status === 'failed');
      if (this.filter === 'ok')      list = list.filter(j => j.status === 'ok');
      return list.slice().sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
    },

    get detailSteps() {
      if (!this.detail || !this.detail.job) return [];
      try {
        const seg = this.detail.job.segments;
        if (typeof seg === 'string') return JSON.parse(seg);
        if (Array.isArray(seg)) return seg;
        return [];
      } catch (e) { return []; }
    },
    get detailResults() {
      if (!this.detail || !this.detail.job) return [];
      try {
        const res = this.detail.job.results;
        if (typeof res === 'string') return JSON.parse(res);
        if (Array.isArray(res)) return res;
        return [];
      } catch (e) { return []; }
    },
    getStepResult(idx) { return this.detailResults.find(r => r.step === idx) || null; },

    async toggleExpand(id) {
      if (this.expandedId === id) { this.expandedId = null; this.detail = null; return; }
      this.expandedId = id;
      this.detail = null;
      this.detailLoading = true;
      try {
        const r = await fetch('/api/jobs/' + id);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.detail = await r.json();
      } catch (e) {
        this.error = 'job detail failed: ' + e.message;
      } finally { this.detailLoading = false; }
    },

    async executeJob(id) {
      if (!confirm('Execute job #' + id + '?')) return;
      try {
        const r = await fetch('/api/jobs/' + id + '/execute', { method: 'POST' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        await this.loadAll();
        this.expandedId = null;
        await this.toggleExpand(id);
      } catch (e) { this.error = 'execute failed: ' + e.message; }
    },
    async deleteJob(id) {
      if (!confirm('Delete job #' + id + '?')) return;
      try {
        const r = await fetch('/api/jobs/' + id, { method: 'DELETE' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.expandedId = null; this.detail = null;
        await this.loadAll();
      } catch (e) { this.error = 'delete failed: ' + e.message; }
    },
    async decide(authId, decision) {
      try {
        const r = await fetch('/api/authorizations/' + authId + '/decide', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ decision })
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        await this.loadAll();
        if (this.expandedId) {
          const id = this.expandedId;
          this.expandedId = null;
          await this.toggleExpand(id);
        }
      } catch (e) { this.error = 'decide failed: ' + e.message; }
    },

    moduleSubtitle() {
      if (!this.data) return 'loading…';
      const c = this.counts;
      return c.running + ' running · ' + c.waiting + ' waiting';
    },
    formatTime(iso) {
      if (!iso) return '-';
      try { return new Date(iso).toLocaleString('ro-RO', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
      catch (e) { return iso; }
    },
    formatTimeFull(iso) {
      if (!iso) return '-';
      try { return new Date(iso).toLocaleString('ro-RO'); } catch (e) { return iso; }
    },
    lastLoadedRel() {
      if (!this.lastLoadedAt) return '—';
      const dt = (Date.now() - this.lastLoadedAt) / 1000;
      if (dt < 5) return 'just now';
      if (dt < 60) return Math.floor(dt) + 's ago';
      if (dt < 3600) return Math.floor(dt / 60) + 'm ago';
      return Math.floor(dt / 3600) + 'h ago';
    },

    connectStream() {
      if (this._reconnectTimer) { clearTimeout(this._reconnectTimer); this._reconnectTimer = null; }
      if (this._es) { try { this._es.close(); } catch (e) {} }
      this._es = new EventSource('/api/stream/activity');
      this._es.onopen = () => { this.connected = true; this._reconnectDelay = 1000; };
      this._es.onerror = () => {
        if (this._reconnectTimer) return;
        this.connected = false;
        try { this._es.close(); } catch (e) {}
        const base = this._reconnectDelay;
        const jitter = base * (0.8 + Math.random() * 0.4);
        this._reconnectDelay = Math.min(base * 2, 30000);
        this._reconnectTimer = setTimeout(() => { this._reconnectTimer = null; this.connectStream(); }, jitter);
      };
      this._es.addEventListener('hello', () => { this.connected = true; this.pushFeed('info', 'stream connected', ''); });
      this._es.addEventListener('auth_pending', (e) => {
        try { const d = JSON.parse(e.data); this.pushFeed('pending', 'auth_pending #' + d.id, (d.operation || '').slice(0, 60)); } catch (err) {}
      });
      this._es.addEventListener('auth_decided', (e) => {
        try { const d = JSON.parse(e.data); this.pushFeed(d.decision === 'approved' ? 'approved' : 'denied', 'auth_decided #' + d.id, d.decision || ''); this.loadAll(); } catch (err) {}
      });
    },
    pushFeed(kind, title, sub, ts) {
      this._feedSeq++;
      const t = ts ? new Date(ts) : new Date();
      this.feed.unshift({ uid: this._feedSeq, kind, title, sub, t: t.toTimeString().slice(0, 5) });
      if (this.feed.length > 50) this.feed.length = 50;
    },

    openPalette() { this.paletteOpen = true; this.paletteQuery = ''; this.paletteSelectedIdx = 0; },
    closePalette() { this.paletteOpen = false; this.paletteQuery = ''; },
    runPaletteAction(idx) {
      const r = this.paletteResults;
      if (idx < 0 || idx >= r.length) return;
      const a = r[idx];
      this.closePalette();
      this.$nextTick(() => a.run());
    },
    get paletteActions() {
      return [
        { label: 'Refresh jobs',     hint: 'reload jobs + auth',           run: () => this.loadAll() },
        { label: 'Filter: active',   hint: 'pending + running + waiting',  run: () => { this.filter = 'active'; }},
        { label: 'Filter: waiting',  hint: 'jobs awaiting authorization',  run: () => { this.filter = 'waiting'; }},
        { label: 'Filter: failed',   hint: 'failed jobs only',             run: () => { this.filter = 'failed'; }},
        { label: 'Clear filter',     hint: 'show all',                     run: () => { this.filter = 'all'; }},
        { label: 'Open Approvals',   hint: 'navigate to approvals module', run: () => location.href = '../approvals/index.html' }
      ];
    },
    get paletteResults() {
      const q = this.paletteQuery.trim().toLowerCase();
      if (!q) return this.paletteActions;
      return this.paletteActions.filter(a => a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q));
    },

    _isTypingTarget(evt) { const t = evt.target; return t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable); },
    onGlobalKey(evt) {
      const k = evt.key;
      if ((evt.ctrlKey || evt.metaKey) && (k === 'k' || k === 'K')) { this.openPalette(); evt.preventDefault(); return; }
      if (this.paletteOpen) {
        if (k === 'Escape') { this.closePalette(); evt.preventDefault(); return; }
        if (k === 'Enter')  { this.runPaletteAction(this.paletteSelectedIdx); evt.preventDefault(); return; }
        if (k === 'ArrowDown') { this.paletteSelectedIdx = Math.min(this.paletteSelectedIdx + 1, this.paletteResults.length - 1); evt.preventDefault(); return; }
        if (k === 'ArrowUp')   { this.paletteSelectedIdx = Math.max(this.paletteSelectedIdx - 1, 0); evt.preventDefault(); return; }
        return;
      }
      if (this._isTypingTarget(evt)) return;
      if (k === 'r' || k === 'R') { this.loadAll(); evt.preventDefault(); }
      if (k === 'Escape' && this.expandedId !== null) { this.expandedId = null; this.detail = null; evt.preventDefault(); }
    }
  };
}
</script>
