<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>ARGOS — Health</title>

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../../static/tokens.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div x-data="app()" x-cloak>

  <div class="shell">

    <header class="topbar">
      <a class="topbar__brand" href="../../../index.html">
        <img src="/ui/v2/static/brand/mark-full-color.svg" alt="">
        <span class="topbar__wordmark">ARGOS</span>
      </a>
      <span class="topbar__divider"></span>
      <div class="topbar__module">
        <span>Health</span>
        <span class="crumb-sep">/</span>
        <strong x-text="moduleSubtitle()"></strong>
      </div>

      <div class="topbar__search" @click="openPalette()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Search or run command</span>
        <span class="kbd">⌘K</span>
      </div>

      <div class="topbar__right">
        <div class="topbar__conn">
          <span class="dot" :class="connected ? 'dot--ok' : 'dot--error dot--pulse'"></span>
          <span x-text="connected ? 'live' : 'reconnecting'"></span>
        </div>
        <div class="topbar__user" title="operator@hermes">op</div>
      </div>
    </header>

    <aside class="sidebar">
      <div class="side-section">
        <div class="side-section__label">Modules</div>
        <a class="nav-item" href="../approvals/index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7h18M3 12h18M3 17h12"/></svg></span>
          Approvals<span class="nav-item__shortcut">g a</span>
        </a>
        <a class="nav-item" href="../fleet/index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
          Fleet<span class="nav-item__shortcut">g f</span>
        </a>
        <a class="nav-item" href="../jobs/index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
          Jobs<span class="nav-item__shortcut">g j</span>
        </a>
        <a class="nav-item is-active" href="./index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12h-4l-3 9-6-18-3 9H2"/></svg></span>
          Health
          <span class="nav-item__count num" x-text="data ? (data.counts?.total ?? 0) : '·'"></span>
        </a>
        <a class="nav-item" href="../chats/index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          Chat<span class="nav-item__shortcut">g c</span>
        </a>
        <a class="nav-item" href="../reasoning/index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
          Reasoning<span class="nav-item__shortcut">g r</span>
        </a>
        <a class="nav-item" href="../settings/index.html">
          <span class="nav-item__icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/></svg></span>
          Settings<span class="nav-item__shortcut">g s</span>
        </a>
      </div>

      <div class="side-section">
        <div class="side-section__label">Filters</div>
        <div class="side-search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color: var(--text-tertiary);"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" placeholder="search node/service…" x-model="search">
        </div>

        <div class="filter-group">
          <div class="side-section__label" style="padding: var(--s-2) var(--s-2) var(--s-1);">Status</div>
          <template x-for="s in ['ok','warn','error','unknown']" :key="s">
            <label class="filter-row" :class="{'is-checked': isFilterChecked('status', s)}" @click.prevent="toggleFilter('status', s)">
              <input type="checkbox" :checked="isFilterChecked('status', s)">
              <span style="text-transform: capitalize;" x-text="s"></span>
              <span class="mono" x-text="filterCount('status', s)"></span>
            </label>
          </template>
        </div>
      </div>
    </aside>

    <main class="main">

      <template x-if="!connected">
        <div class="banner banner--error">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>
          <span class="banner__msg">SSE disconnected — reconnecting</span>
          <span class="spacer"></span>
        </div>
      </template>

      <template x-if="error">
        <div class="banner banner--error">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          <span class="banner__msg" x-text="error"></span>
          <span class="spacer"></span>
          <button class="btn btn--ghost" @click="error = null">Dismiss</button>
        </div>
      </template>

      <div class="module__head">
        <h1 class="module__title">Health</h1>
        <span class="module__sub" x-show="data">
          <span class="num" x-text="data?.counts?.total ?? 0"></span> services ·
          <span class="num" x-text="data?.counts?.ok ?? 0"></span> ok ·
          <span class="num" x-text="data?.counts?.warn ?? 0"></span> warn ·
          <span class="num" x-text="data?.counts?.error ?? 0"></span> error ·
          <span class="num" x-text="data?.counts?.unknown ?? 0"></span> unknown
          <span style="color: var(--text-tertiary); margin-left: var(--s-2);" x-text="'· src ' + (data?.source || '?')"></span>
        </span>
        <div class="module__actions">
          <button class="btn btn--ghost" @click="loadSnapshot()" :disabled="loading">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/></svg>
            <span x-text="loading ? 'Loading…' : 'Refresh'"></span>
          </button>
        </div>
      </div>

      <div class="module__body">
        <div class="queue">
          <template x-for="[node, items] in groupedNodes" :key="node">
            <div class="group">
              <div class="group__head">
                <span class="dot" :class="'fleet-dot--' + nodeStatus(items)"></span>
                <span class="group__id" x-text="node"></span>
                <span class="group__meta" x-text="items.length + ' service(s)'"></span>
                <span class="group__counts">
                  <template x-for="lvl in ['ok','warn','error','unknown']" :key="lvl">
                    <span x-show="items.filter(i => i.status === lvl).length > 0"
                          class="group__count" :class="'health-count--' + lvl"
                          x-text="items.filter(i => i.status === lvl).length + ' ' + lvl"></span>
                  </template>
                </span>
              </div>
              <div class="group__body">
                <template x-for="svc in items" :key="svc.id">
                  <article class="card health-svc-card" :data-health-status="svc.status" @click="selectService(node, svc.service)">
                    <header class="card__head">
                      <span class="dot" :class="'fleet-dot--' + svc.status"></span>
                      <span class="auth-id" x-text="svc.service"></span>
                      <span class="card__kind" x-text="svc.status"></span>
                      <span class="spacer"></span>
                      <span class="mono" x-text="formatAge(svc.ts)"></span>
                    </header>
                    <div class="card__meta">
                      <span x-show="svc.cpu_pct !== null" class="mono">cpu <b x-text="(svc.cpu_pct >= 0 ? svc.cpu_pct.toFixed(1) : '?') + '%'"></b></span>
                      <span x-show="svc.cpu_pct !== null" class="sep">·</span>
                      <span x-show="svc.mem_pct !== null" class="mono">mem <b x-text="svc.mem_pct?.toFixed(1) + '%'"></b></span>
                      <span x-show="svc.mem_pct !== null" class="sep">·</span>
                      <span x-show="svc.db_latency_ms !== null" class="mono">db <b x-text="svc.db_latency_ms + 'ms'"></b></span>
                      <span x-show="svc.db_latency_ms !== null" class="sep">·</span>
                      <span x-show="svc.containers_up !== null" class="mono">ctr <b x-text="svc.containers_up"></b></span>
                    </div>
                    <div x-show="svc.error_msg" class="card__op" x-text="svc.error_msg"></div>
                  </article>
                </template>
              </div>
            </div>
          </template>
          <template x-if="data && groupedNodes.length === 0">
            <div class="empty">
              <div class="empty__inner">
                <img class="empty__mark" src="/ui/v2/static/brand/mark-mono-amber.svg" alt="">
                <h2 class="empty__title">No data</h2>
                <div class="empty__sub">No heartbeats in log.</div>
              </div>
            </div>
          </template>
          <template x-if="!data && loading">
            <div class="empty"><div class="empty__inner"><div class="empty__sub">Loading snapshot…</div></div></div>
          </template>
        </div>
      </div>

      <!-- DRILL-DOWN DRAWER -->
      <template x-if="selected">
        <aside class="drawer">
          <div class="drawer__head">
            <h2 class="drawer__title mono" x-text="selected"></h2>
            <span class="mono" style="color: var(--text-tertiary);" x-text="logEntries.length + ' entries'"></span>
            <span class="spacer" style="flex:1;"></span>
            <button class="btn btn--icon" @click.stop="closeDrill()" title="Close (Esc)">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="drawer__body">
            <div class="section-label">History (last 50)</div>
            <template x-if="logLoading">
              <div style="color: var(--text-secondary); padding: var(--s-3);">Loading…</div>
            </template>
            <template x-for="e in logEntries" :key="e.id">
              <div class="card health-log-row" :data-health-status="e.status">
                <header class="card__head">
                  <span class="dot" :class="'fleet-dot--' + e.status"></span>
                  <span class="mono" x-text="formatTime(e.ts)"></span>
                  <span class="card__kind" x-text="e.status"></span>
                  <span class="spacer"></span>
                </header>
                <div class="card__meta">
                  <span class="mono">cpu <b x-text="(e.cpu_pct >= 0 ? e.cpu_pct.toFixed(1) : '?')"></b>%</span>
                  <span class="sep">·</span>
                  <span class="mono">mem <b x-text="e.mem_pct?.toFixed(1)"></b>%</span>
                  <span class="sep">·</span>
                  <span class="mono">db <b x-text="e.db_latency_ms"></b>ms</span>
                  <span class="sep">·</span>
                  <span class="mono">ctr <b x-text="e.containers_up"></b></span>
                </div>
              </div>
            </template>
            <template x-if="!logLoading && logEntries.length === 0">
              <div style="color: var(--text-tertiary); padding: var(--s-3);">No history.</div>
            </template>
          </div>
        </aside>
      </template>

    </main>

    <aside class="rail">
      <div class="rail__head">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color: var(--accent);"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span class="rail__title">Now</span>
        <span class="spacer" style="flex: 1;"></span>
        <span class="dot" :class="connected ? 'dot--ok dot--pulse' : 'dot--error'"></span>
        <span class="mono" style="color: var(--text-tertiary); font-size: var(--fs-11);" x-text="connected ? 'live' : 'paused'"></span>
      </div>
      <div class="rail__body">
        <template x-for="item in feed" :key="item.uid">
          <div class="feed-item" :class="'feed-item--' + item.kind">
            <span class="feed-item__time" x-text="item.t"></span>
            <div class="feed-item__body">
              <div class="feed-item__title" x-text="item.title"></div>
              <div class="feed-item__sub" x-text="item.sub"></div>
            </div>
          </div>
        </template>
        <template x-if="feed.length === 0">
          <div style="padding: var(--s-3); color: var(--text-tertiary); font-size: var(--fs-12);">waiting for events…</div>
        </template>
      </div>
    </aside>

    <footer class="statusbar">
      <span class="seg-group"><span class="dot dot--ok"></span><span class="label">health:</span><span x-text="data ? (data.counts?.ok ?? 0) + '/' + (data.counts?.total ?? 0) : '…'"></span></span>
      <span class="seg-group"><span class="dot" :class="connected ? 'dot--ok' : 'dot--error'"></span><span class="label">sse:</span><span x-text="connected ? 'live' : 'down'"></span></span>
      <span class="seg-group"><span class="label">last:</span><span x-text="lastLoadedRel()"></span></span>
      <span class="spacer"></span>
      <span class="label">argos v0.7.0 · ui v2 · health</span>
    </footer>

  </div>

  <template x-if="paletteOpen">
    <div class="palette-backdrop" @click.self="closePalette()">
      <div class="palette" role="dialog">
        <input x-model="paletteQuery" @keydown.escape.stop="closePalette()" class="palette__input" type="text" autofocus placeholder="Search or run command…">
        <template x-for="(a, i) in paletteResults" :key="i">
          <div class="palette__item" :class="{'is-active': i === paletteSelectedIdx}" @click="runPaletteAction(i)">
            <span x-text="a.label"></span>
            <span class="spacer"></span>
            <span class="meta" x-text="a.hint"></span>
          </div>
        </template>
        <div class="palette__foot">
          <span class="hint"><span class="kbd">↑↓</span> navigate</span>
          <span class="hint"><span class="kbd">⏎</span> run</span>
          <span class="hint"><span class="kbd">esc</span> close</span>
          <span class="spacer" style="flex:1;"></span>
          <span class="mono" style="color: var(--text-disabled);" x-text="paletteResults.length + ' matches'"></span>
        </div>
      </div>
    </div>
  </template>

</div>

<script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
<script>
function app() {
  return {
    data: null, loading: false, error: null, search: '',
    activeFilters: { status: [] }, lastLoadedAt: null,
    selected: null, logEntries: [], logLoading: false,
    connected: false, _reconnectDelay: 1000, _reconnectTimer: null, _es: null,
    paletteOpen: false, paletteQuery: '', paletteSelectedIdx: 0,
    feed: [], _feedSeq: 0,

    init() {
      window.addEventListener('keydown', (e) => this.onGlobalKey(e));
      this.$watch('paletteQuery', () => { this.paletteSelectedIdx = 0; });
      this.loadSnapshot();
      this.connectStream();
    },

    async loadSnapshot() {
      this.loading = true; this.error = null;
      try {
        const r = await fetch('/api/health/snapshot');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.data = await r.json();
        this.lastLoadedAt = Date.now();
      } catch (e) {
        this.error = 'health snapshot failed: ' + e.message;
      } finally { this.loading = false; }
    },

    get groupedNodes() {
      if (!this.data) return [];
      const byNode = this.data.by_node || {};
      const f = this.activeFilters;
      const s = this.search.toLowerCase().trim();
      const out = [];
      for (const [node, items] of Object.entries(byNode)) {
        let list = items;
        if (f.status.length > 0) list = list.filter(x => f.status.includes(x.status));
        if (s) {
          const nodeMatch = node.toLowerCase().includes(s);
          if (!nodeMatch) list = list.filter(x => (x.service || '').toLowerCase().includes(s));
        }
        if (list.length > 0) out.push([node, list]);
      }
      return out;
    },

    moduleSubtitle() {
      if (!this.data) return 'loading…';
      const c = this.data.counts || {};
      return (c.ok ?? 0) + '/' + (c.total ?? 0) + ' ok';
    },

    isFilterChecked(cat, val) { return this.activeFilters[cat].includes(val); },
    toggleFilter(cat, val) {
      const arr = this.activeFilters[cat];
      const idx = arr.indexOf(val);
      if (idx === -1) arr.push(val); else arr.splice(idx, 1);
    },
    filterCount(cat, val) {
      const list = this.data?.items || [];
      if (cat === 'status') return list.filter(x => x.status === val).length;
      return 0;
    },

    nodeStatus(items) {
      if (items.some(i => i.status === 'error')) return 'error';
      if (items.some(i => i.status === 'warn')) return 'warn';
      if (items.every(i => i.status === 'ok')) return 'ok';
      return 'unknown';
    },

    async selectService(node, service) {
      this.selected = node + '/' + service;
      this.logLoading = true;
      this.logEntries = [];
      try {
        const r = await fetch('/api/health/log?node=' + encodeURIComponent(node) + '&service=' + encodeURIComponent(service) + '&limit=50');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        this.logEntries = d.log || [];
      } catch (e) {
        this.error = 'log fetch failed: ' + e.message;
      } finally { this.logLoading = false; }
    },
    closeDrill() { this.selected = null; this.logEntries = []; },

    formatTime(iso) {
      if (!iso) return '-';
      try { return new Date(iso).toLocaleString('ro-RO', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
      catch (e) { return iso; }
    },
    formatAge(iso) {
      if (!iso) return '-';
      try {
        const dt = (Date.now() - new Date(iso).getTime()) / 1000;
        if (dt < 5) return 'live';
        if (dt < 60) return Math.floor(dt) + 's';
        if (dt < 3600) return Math.floor(dt / 60) + 'm';
        if (dt < 86400) return Math.floor(dt / 3600) + 'h';
        return Math.floor(dt / 86400) + 'z';
      } catch (e) { return iso; }
    },
    lastLoadedRel() {
      if (!this.lastLoadedAt) return '—';
      const dt = (Date.now() - this.lastLoadedAt) / 1000;
      if (dt < 5) return 'just now';
      if (dt < 60) return Math.floor(dt) + 's ago';
      if (dt < 3600) return Math.floor(dt / 60) + 'm ago';
      return Math.floor(dt / 3600) + 'h ago';
    },

    connectStream() {
      if (this._reconnectTimer) { clearTimeout(this._reconnectTimer); this._reconnectTimer = null; }
      if (this._es) { try { this._es.close(); } catch (e) {} }
      this._es = new EventSource('/api/stream/activity');
      this._es.onopen = () => { this.connected = true; this._reconnectDelay = 1000; };
      this._es.onerror = () => {
        if (this._reconnectTimer) return;
        this.connected = false;
        try { this._es.close(); } catch (e) {}
        const base = this._reconnectDelay;
        const jitter = base * (0.8 + Math.random() * 0.4);
        this._reconnectDelay = Math.min(base * 2, 30000);
        this._reconnectTimer = setTimeout(() => { this._reconnectTimer = null; this.connectStream(); }, jitter);
      };
      this._es.addEventListener('hello', () => { this.connected = true; this.pushFeed('info', 'stream connected', ''); });
      this._es.addEventListener('heartbeat', (e) => {
        try {
          const d = JSON.parse(e.data);
          const cpu = d.cpu_pct >= 0 ? d.cpu_pct.toFixed(0) + '%' : '?';
          this.pushFeed(d.status === 'ok' ? 'approved' : (d.status === 'warn' ? 'pending' : 'denied'),
                        d.node + '/' + d.service, 'cpu ' + cpu + ' · ' + d.status, d.ts);
        } catch (err) {}
      });
      this._es.addEventListener('auth_pending', (e) => {
        try { const d = JSON.parse(e.data); this.pushFeed('pending', 'auth_pending #' + d.id, (d.operation || '').slice(0, 60)); } catch (err) {}
      });
      this._es.addEventListener('auth_decided', (e) => {
        try { const d = JSON.parse(e.data); this.pushFeed(d.decision === 'approved' ? 'approved' : 'denied', 'auth_decided #' + d.id, d.decision || ''); } catch (err) {}
      });
    },
    pushFeed(kind, title, sub, ts) {
      this._feedSeq++;
      const t = ts ? new Date(ts) : new Date();
      this.feed.unshift({ uid: this._feedSeq, kind, title, sub, t: t.toTimeString().slice(0, 5) });
      if (this.feed.length > 50) this.feed.length = 50;
    },

    openPalette() { this.paletteOpen = true; this.paletteQuery = ''; this.paletteSelectedIdx = 0; },
    closePalette() { this.paletteOpen = false; this.paletteQuery = ''; },
    runPaletteAction(idx) {
      const r = this.paletteResults;
      if (idx < 0 || idx >= r.length) return;
      const a = r[idx];
      this.closePalette();
      this.$nextTick(() => a.run());
    },
    get paletteActions() {
      return [
        { label: 'Refresh snapshot', hint: 'reload /api/health/snapshot', run: () => this.loadSnapshot() },
        { label: 'Filter: error',    hint: 'show only error services',    run: () => { this.activeFilters.status = ['error']; }},
        { label: 'Filter: warn',     hint: 'show only warn services',     run: () => { this.activeFilters.status = ['warn']; }},
        { label: 'Clear filters',    hint: 'reset filters',                run: () => { this.activeFilters.status = []; this.search = ''; }},
        { label: 'Open Fleet',       hint: 'navigate to fleet module',     run: () => location.href = '../fleet/index.html' },
        { label: 'Open Approvals',   hint: 'navigate to approvals module', run: () => location.href = '../approvals/index.html' }
      ];
    },
    get paletteResults() {
      const q = this.paletteQuery.trim().toLowerCase();
      if (!q) return this.paletteActions;
      return this.paletteActions.filter(a => a.label.toLowerCase().includes(q) || a.hint.toLowerCase().includes(q));
    },

    _isTypingTarget(evt) { const t = evt.target; return t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable); },
    onGlobalKey(evt) {
      const k = evt.key;
      if ((evt.ctrlKey || evt.metaKey) && (k === 'k' || k === 'K')) { this.openPalette(); evt.preventDefault(); return; }
      if (this.paletteOpen) {
        if (k === 'Escape') { this.closePalette(); evt.preventDefault(); return; }
        if (k === 'Enter')  { this.runPaletteAction(this.paletteSelectedIdx); evt.preventDefault(); return; }
        if (k === 'ArrowDown') { this.paletteSelectedIdx = Math.min(this.paletteSelectedIdx + 1, this.paletteResults.length - 1); evt.preventDefault(); return; }
        if (k === 'ArrowUp')   { this.paletteSelectedIdx = Math.max(this.paletteSelectedIdx - 1, 0); evt.preventDefault(); return; }
        return;
      }
      if (k === 'Escape' && this.selected) { this.closeDrill(); evt.preventDefault(); return; }
      if (this._isTypingTarget(evt)) return;
      if (k === 'r' || k === 'R') { this.loadSnapshot(); evt.preventDefault(); }
    }
  };
}
</script>
