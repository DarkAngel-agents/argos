name: ARGOS GitHub Agent

on:
  schedule:
    - cron: '0 */6 * * *'   # la fiecare 6 ore
  workflow_dispatch:

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ARGOS GitHub Agent
        run: |
          echo "GitHub Agent activat - va crea issues/PR-uri din error_patterns si va propune skills noi."
          # Aici va veni logica reala mai tarziu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
